services:
  app:
    build:
      target: development
    environment:
      NODE_ENV: development
      APP_DOMAIN: ${APP_DOMAIN:-http://localhost:3000}
      GOOGLE_CALLBACK_URL: http://localhost:3000/login/google/callback
    command: npm run dev
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./tasktrail:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
